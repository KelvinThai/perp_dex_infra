apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: perp-dex-ingress
  namespace: perp-dex
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: "dlob-ws"
spec:
  ingressClassName: nginx
  rules:
  - host: dex.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 3000
      - path: /dlob
        pathType: Prefix
        backend:
          service:
            name: dlob-api
            port:
              number: 6969
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: dlob-ws
            port:
              number: 6970
